<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Journey - Jack Van Zeeland</title>
    <meta name="description" content="Track your personal journey through the portfolio site, discover achievements, and explore new areas">

    <meta name="theme-color" content="#0ea5e9" />
    <link rel="canonical" href="https://jackvanzeeland.com/pages/journey" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://jackvanzeeland.com/pages/journey" />
    <meta property="og:title" content="Your Journey - Jack Van Zeeland" />
    <meta property="og:description" content="Track your exploration of the portfolio and unlock achievements along the way." />
    <meta property="og:image" content="https://jackvanzeeland.com/assets/images/JVZLogo.png" />
    <meta property="og:site_name" content="Jack Van Zeeland Portfolio" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Your Journey - Jack Van Zeeland" />
    <meta name="twitter:image" content="https://jackvanzeeland.com/assets/images/JVZLogo.png" />

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="/src/styles/color-scheme.css">
    <link rel="stylesheet" href="/src/styles/main.css">
    <link rel="stylesheet" href="/src/styles/components/header.css">
    <link rel="stylesheet" href="/src/styles/components/footer.css">
</head>
<body>
    <!-- Header and particles will be injected by Layout component -->

    <main id="main-content">
        <!-- Hero Section -->
        <section class="py-5 page-hero">
            <div class="container">
                <div class="text-center" data-aos="fade-up">
                    <h1 class="display-4 fw-bold mb-4">Your Journey</h1>
                    <p class="lead text-muted mb-4">Track your exploration of the portfolio and unlock achievements along the way</p>
                    
                    <!-- Progress Overview -->
                    <div class="journey-overview mb-4" data-aos="fade-up" data-aos-delay="100">
                        <div class="progress-stats">
                            <h3 class="progress-percentage" id="journey-percentage">0%</h3>
                            <p class="progress-text">Site Exploration Complete</p>
                        </div>
                        <div class="journey-progress-bar">
                            <div class="progress" style="height: 30px;">
                                <div class="progress-bar progress-bar-striped progress-bar-animated" 
                                     id="journey-progress-bar" 
                                     role="progressbar" 
                                     style="width: 0%">
                                    0%
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Journey Content -->
        <section class="py-5">
            <div class="container">
                <!-- Pages Visited -->
                <div class="row">
                    <div class="col-lg-6 mb-4" data-aos="fade-right" data-aos-delay="200">
                        <div class="journey-section">
                            <h3 class="mb-4">Pages Explored</h3>
                            <div class="pages-grid" id="pages-visited">
                                <!-- Populated by JavaScript -->
                            </div>
                        </div>
                    </div>
                    
                    <!-- Achievements -->
                    <div class="col-lg-6 mb-4" data-aos="fade-left" data-aos-delay="300">
                        <div class="journey-section">
                            <h3 class="mb-4">Achievements</h3>
                            <div class="achievements-grid" id="achievements-display">
                                <!-- Populated by JavaScript -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Recommendations -->
                <div class="row mt-4">
                    <div class="col-12" data-aos="fade-up" data-aos-delay="200">
                        <div class="journey-section">
                            <h3 class="mb-4">Next Steps & Recommendations</h3>
                            <div class="recommendations" id="recommendations">
                                <!-- Populated by JavaScript -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Journey Stats -->
                <div class="row mt-4">
                    <div class="col-md-3 col-6 mb-3" data-aos="fade-up" data-aos-delay="100">
                        <div class="journey-stat-card text-center p-3">
                            <div class="stat-icon">📖</div>
                            <h4 class="stat-value" id="pages-count">0</h4>
                            <p class="stat-label">Pages Visited</p>
                        </div>
                    </div>
                    <div class="col-md-3 col-6 mb-3" data-aos="fade-up" data-aos-delay="150">
                        <div class="journey-stat-card text-center p-3">
                            <div class="stat-icon">🏆</div>
                            <h4 class="stat-value" id="achievements-count">0</h4>
                            <p class="stat-label">Achievements</p>
                        </div>
                    </div>
                    <div class="col-md-3 col-6 mb-3" data-aos="fade-up" data-aos-delay="200">
                        <div class="journey-stat-card text-center p-3">
                            <div class="stat-icon">⏱️</div>
                            <h4 class="stat-value" id="time-spent">0m</h4>
                            <p class="stat-label">Time Spent</p>
                        </div>
                    </div>
                    <div class="col-md-3 col-6 mb-3" data-aos="fade-up" data-aos-delay="250">
                        <div class="journey-stat-card text-center p-3">
                            <div class="stat-icon">🔄</div>
                            <h4 class="stat-value" id="visits-count">1</h4>
                            <p class="stat-label">Total Visits</p>
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="text-center mt-5" data-aos="fade-up" data-aos-delay="300">
                    <div class="journey-actions">
                        <button class="btn btn-outline-primary btn-lg me-3" onclick="resetJourney()">
                            <span class="fas fa-redo"></span> Reset Journey
                        </button>
                        <button class="btn btn-success btn-lg me-3" onclick="shareJourney()">
                            <span class="fas fa-share"></span> Share Progress
                        </button>
                        <a href="/#projects" class="btn btn-primary btn-lg">
                            <span class="fas fa-compass"></span> Continue Exploring
                        </a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer will be injected by Layout component -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    
    <script type="module" src="/src/components/Layout.ts"></script>
    <script type="module" src="/src/pages/journey.ts"></script>
    <script type="module" src="/src/components/JourneyDashboard.js"></script>
</body>
</html>

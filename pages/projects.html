<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects - Jack Van Zeeland</title>
    <meta
      name="description"
      content="Explore Jack Van Zeeland's portfolio of software engineering projects including automation tools, AI applications, data analysis, and interactive web experiences."
    />

    <meta name="theme-color" content="#0ea5e9" />
    <link rel="canonical" href="https://jackvanzeeland.com/pages/projects" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://jackvanzeeland.com/pages/projects" />
    <meta property="og:title" content="Projects - Jack Van Zeeland" />
    <meta property="og:description" content="Explore Jack Van Zeeland's portfolio of software engineering projects including automation tools, AI applications, and interactive web experiences." />
    <meta property="og:image" content="https://jackvanzeeland.com/assets/images/JVZLogo.png" />
    <meta property="og:site_name" content="Jack Van Zeeland Portfolio" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Projects - Jack Van Zeeland" />
    <meta name="twitter:image" content="https://jackvanzeeland.com/assets/images/JVZLogo.png" />

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Resource Hints -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles/color-scheme.css" />
    <link rel="stylesheet" href="/src/styles/main.css" />
    <link rel="stylesheet" href="/src/styles/components/header.css" />
    <link rel="stylesheet" href="/src/styles/components/footer.css" />
    <link rel="stylesheet" href="/src/styles/components/projects.css" />
  </head>
  <body>
    <!-- Header and particles will be injected by Layout component -->

    <main id="main-content">
      <!-- Hero Section -->
      <section class="py-5 page-hero">
        <div class="container">
          <div class="row align-items-center">
            <div class="col-lg-8 mx-auto text-center" data-aos="fade-up">
              <span class="page-eyebrow">Portfolio</span>
              <h1 class="display-4 fw-bold mb-3">Projects</h1>
              <p class="lead text-muted mb-0">
                10 projects spanning automation, AI, data analysis, and interactive tools.
                Use the filters below to explore by category.
              </p>
            </div>
          </div>
        </div>
      </section>

      <!-- Filter & Grid Section -->
      <section class="py-5">
        <div class="container">

          <!-- Filter Bar -->
          <div class="projects-filter-bar mb-5" data-aos="fade-up">
            <div class="projects-filter-inner">
              <span class="filter-label-text">Filter by</span>
              <div id="filter-buttons" class="d-flex flex-wrap gap-2"></div>
            </div>
            <p id="projects-count" class="projects-count mb-0"></p>
          </div>

          <div id="projects-grid" class="row g-4"></div>
        </div>
      </section>
    </main>

    <!-- Footer will be injected by Layout component -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

    <script type="module" src="/src/components/Layout.ts"></script>
    <script type="module" src="/src/pages/projects.ts"></script>
  </body>
</html>
